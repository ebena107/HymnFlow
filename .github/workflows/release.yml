name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: tag_name
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create plugin package
        run: |
          VER=${{ steps.tag_name.outputs.VERSION }}
          DIR=hymnflow-$VER
          mkdir -p $DIR

          # Core application files
          cp -r public/obs-dock    $DIR/
          cp -r public/obs-overlay $DIR/
          cp -r public/data        $DIR/
          cp -r public/parsers     $DIR/
          cp -r public/i18n        $DIR/
          cp public/obs-setup.html $DIR/
          cp public/validation.js  $DIR/

          # Scripts: OBS hotkey bridge + Bible converters
          mkdir -p $DIR/scripts
          cp scripts/hymnflow-obs-hotkeys.py  $DIR/scripts/
          cp scripts/convert_bible_txt.py     $DIR/scripts/
          cp scripts/convert_yoruba_bible.py  $DIR/scripts/
          cp scripts/bundle_bible_kjv.py      $DIR/scripts/

          # Documentation
          cp README.md              $DIR/
          cp doc/SETUP.md           $DIR/
          cp doc/TROUBLESHOOTING.md $DIR/
          cp doc/SECURITY.md        $DIR/
          # Include version-specific release notes if they exist
          [ -f "doc/RELEASE_NOTES_v$VER.md" ] && cp "doc/RELEASE_NOTES_v$VER.md" $DIR/ || true

      - name: Create ZIP archive
        run: |
          zip -r hymnflow-v${{ steps.tag_name.outputs.VERSION }}-plugin.zip hymnflow-${{ steps.tag_name.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: hymnflow-v${{ steps.tag_name.outputs.VERSION }}-plugin.zip
          body_path: .github/release-template.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: hymnflow-plugin
          path: hymnflow-v${{ steps.tag_name.outputs.VERSION }}-plugin.zip
